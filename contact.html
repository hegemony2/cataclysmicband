      <h1>Contact</h1>
      <p>Get in touch with Cataclysmic for booking, press, or general inquiries.</p>

      <!-- Replace YOUR_FORM_ID with your Formspree form ID – https://formspree.io -->
      <form class="contact-form" action="https://formspree.io/f/mreyavdq" method="POST">
        <input type="hidden" name="_replyto" value="info@cataclysmicband.com">
        <input type="hidden" name="_subject" value="Thanks!!! from cataclysmicband.com">
        <input type="hidden" name="_next" value="https://hegemony2.github.io/cataclysmicband/index.html">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div>
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Select a topic</option>
            <option value="booking">Booking / Shows</option>
            <option value="press">Press / Media</option>
            <option value="general">General</option>
          </select>
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Your message..."></textarea>
        </div>
        <button type="submit" class="btn btn-outline">Send Message</button>
      </form>

      <p style="margin-top:2rem;">You can also reach us via our social platforms.</p>
    </div>
